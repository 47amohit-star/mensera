<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Cosmetics Store</title>

<style>
body { font-family: Arial; margin:0; background:#fff5f7; }

header {
  background:#ff4d6d;
  color:white;
  text-align:center;
  padding:15px;
}

.notice {
  text-align:center;
  background:#ffe0e6;
  padding:10px;
  font-weight:bold;
}

.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
}

.product {
  background:white;
  width:220px;
  margin:10px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product img {
  width:100%;
  border-radius:10px;
}

button {
  background:#007bff;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
  cursor:pointer;
}

button:hover {
  background:#0056b3;
}

form {
  text-align:center;
  padding:20px;
}

input {
  width:80%;
  padding:10px;
  margin:5px;
}
</style>

</head>

<body>

<header>
  <h1>Glow Cosmetics Store</h1>
  <p>Wholesale Prices | Local Delivery</p>
</header>

<div class="notice">
🚚 Delivery only within 50 KM
</div>

<!-- PRODUCTS -->
<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Matte Lipstick</h3>
    <p>₹199</p>
    <button onclick="selectProduct('Matte Lipstick')">Order</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Liquid Foundation</h3>
    <p>₹399</p>
    <button onclick="selectProduct('Liquid Foundation')">Order</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Compact Powder</h3>
    <p>₹249</p>
    <button onclick="selectProduct('Compact Powder')">Order</button>
  </div>

</div>

<!-- ORDER FORM -->
<form name="order" method="POST" data-netlify="true">

  <h2>Place Order</h2>

  <input type="text" name="name" placeholder="Your Name" required><br>
  <input type="text" name="phone" placeholder="Phone Number" required><br>
  <input type="text" name="address" placeholder="Address" required><br>

  <input type="text" id="product" name="product" placeholder="Product" readonly required><br>

  <input type="number" name="quantity" placeholder="Quantity" required><br>

  <button type="submit">Submit Order</button>

</form>

<script>
function selectProduct(productName) {
  document.getElementById("product").value = productName;
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>

</body>
</html>
